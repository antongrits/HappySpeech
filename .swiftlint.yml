disabled_rules:
  - trailing_whitespace
  - nesting                     # VIP Models архитектурная необходимость (Request/Response/ViewModel вложены)
  - comma                       # Выравнивающие пробелы перед запятой в tuple literals
  - colon                       # Выравнивающие пробелы в type annotations (табличный стиль)
  - operator_usage_whitespace           # ML-код с выровненными математическими выражениями
  - multiple_closures_with_trailing_closure  # SwiftUI Button(action:) стандартная конструкция
  - implicit_optional_initialization    # SwiftUI @Observable properties

opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicitly_unwrapped_optional
  - operator_usage_whitespace
  - sorted_imports
  - vertical_whitespace_closing_braces
  - redundant_string_enum_value

excluded:
  - .build
  - DerivedData
  - Pods
  - vendor
  - HappySpeech/Resources
  - HappySpeechTests
  - HappySpeechUITests

line_length:
  warning: 160
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 1450
  error: 2000

type_body_length:
  warning: 800
  error: 1200

function_body_length:
  warning: 280
  error: 400

large_tuple:
  warning: 4
  error: 6

identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - id
    - db
    - i
    - j
    - k
    - r
    - g
    - b
    - a
    - x
    - y
    - t
    - s
    - p
    - c
    - v
    - m
    - n
    - dx
    - dy
    - dt
    - to
    - vc
    - w
    - h
    - f
    - d
    - e
    - z

type_name:
  min_length: 3
  max_length: 60

cyclomatic_complexity:
  warning: 20
  error: 30

custom_rules:
  no_print:
    name: "No print"
    regex: '\bprint\s*\('
    message: "Use HSLogger instead of print()"
    severity: error

  no_todo_in_code:
    name: "No TODO comments in code"
    regex: '\/\/\s*(TODO|FIXME|HACK|XXX):'
    message: "Track tasks in backlog.md, not in code comments"
    severity: warning

  no_debug_ui_text:
    name: "No debug text in UI"
    regex: '"(TODO|placeholder|PLACEHOLDER|debug|DEBUG|test string)"'
    message: "No debug text in production UI"
    severity: error
