name: HappySpeech
options:
  bundleIdPrefix: com.mmf.bsu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug
  generateEmptyDirectories: true
  groupSortPosition: top
  settingPresets: none

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_STRICT_CONCURRENCY: complete
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.mmf.bsu.HappySpeech
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: BrandPrimary
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/Frameworks"
      - "@loader_path/Frameworks"
      - "@executable_path/PackageFrameworks"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      ONLY_ACTIVE_ARCH: YES
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: YES

packages:
  RealmSwift:
    url: https://github.com/realm/realm-swift
    from: "20.0.0"
  FirebaseSDK:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.1.9"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.5.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios
    from: "6.0.0"
  Down:
    url: https://github.com/johnxnguyen/Down
    from: "0.11.0"
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.31.3"
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "3.31.3"
  SwiftuiParticles:
    url: https://github.com/benlmyers/swiftui-particles
    from: "1.0.0"

targets:
  HappySpeech:
    type: application
    platform: iOS
    sources:
      - path: HappySpeech
        excludes:
          - Resources/**
        type: group
      - path: HappySpeech/Resources
        excludes:
          - Info.plist
          - "*.entitlements"
          - PrivacyInfo.xcprivacy
          - Models/Whisper/whisper-base/**
          - Models/Whisper/whisper-small/**
        type: group
        buildPhase: resources
      - path: HappySpeech/Resources/PrivacyInfo.xcprivacy
        type: file
        buildPhase: resources
      - path: HappySpeech/Resources/Models/Whisper/whisper-base
        type: folder
        buildPhase: resources
      - path: HappySpeech/Resources/Models/Whisper/whisper-small
        type: folder
        buildPhase: resources
      - path: HappySpeech/Content/Seed/seasonal
        type: folder
        buildPhase: resources
    plist:
      path: HappySpeech/Resources/Info.plist
      properties:
        CFBundleName: HappySpeech
        CFBundleDisplayName: HappySpeech
        CFBundleIdentifier: com.mmf.bsu.HappySpeech
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen:
          UIColorName: LaunchBackground
        LSApplicationCategoryType: "public.app-category.education"
        NSMicrophoneUsageDescription: "HappySpeech использует микрофон для распознавания произношения и логопедических упражнений"
        NSCameraUsageDescription: "HappySpeech использует камеру для AR-упражнений артикуляции и мимической гимнастики"
        NSFaceIDUsageDescription: "HappySpeech может использовать Face ID для быстрого входа родителей"
        NSSpeechRecognitionUsageDescription: "HappySpeech использует распознавание речи для оценки произношения"
        NSUserNotificationsUsageDescription: "HappySpeech отправляет напоминания о ежедневных упражнениях и сводки для родителей"
        NSLocalNetworkUsageDescription: "Чтобы найти друга для совместной игры по локальной сети"
        NSBluetoothAlwaysUsageDescription: "HappySpeech использует Bluetooth для поиска партнёра по игре вблизи"
        NSBonjourServices:
          - "_hs-sibling._tcp"
          - "_hs-sibling._udp"
        UIBackgroundModes:
          - audio
          - fetch
          - remote-notification
        MinimumOSVersion: "17.0"
        KidsAgeRange: "5-8"
        UIRequiredDeviceCapabilities:
          - arm64
          - arkit
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        CFBundleLocalizations:
          - ru
        CFBundleDevelopmentRegion: ru
        UISupportsDocumentBrowser: false
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.mmf.bsu.googlesignin
            CFBundleURLSchemes:
              - com.googleusercontent.apps.142079911892-5n7g0begs0ocu270brlrmvce2emc8vag
    entitlements:
      path: HappySpeech/Resources/HappySpeech.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.mmf.bsu.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mmf.bsu.HappySpeech
        INFOPLIST_FILE: HappySpeech/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HappySpeech/Resources/HappySpeech.entitlements
        PRODUCT_NAME: HappySpeech
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
    dependencies:
      - package: RealmSwift
        product: RealmSwift
      - package: FirebaseSDK
        product: FirebaseAuth
      - package: FirebaseSDK
        product: FirebaseFirestore
      - package: FirebaseSDK
        product: FirebaseStorage
      - package: FirebaseSDK
        product: FirebaseAppCheck
      - package: FirebaseSDK
        product: FirebaseRemoteConfig
      - package: FirebaseSDK
        product: FirebaseMessaging
      - package: FirebaseSDK
        product: FirebasePerformance
      - package: WhisperKit
        product: WhisperKit
      - package: Lottie
        product: Lottie
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: RiveRuntime
        product: RiveRuntime
      - package: Down
        product: Down
      - package: MLXSwift
        product: MLX
      - package: MLXSwift
        product: MLXNN
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: SwiftTransformers
        product: Tokenizers
      - package: SwiftuiParticles
        product: Particles
      - target: HappySpeechWidgetExtension
        embed: true
    scheme:
      testTargets:
        - HappySpeechTests
        - HappySpeechUITests
      gatherCoverageData: true

  HappySpeechTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HappySpeechTests
        excludes:
          - "**/__Snapshots__/**/*.png"
          - "__Snapshots__/**"
    plist:
      path: HappySpeechTests/Info.plist
      properties:
        CFBundleIdentifier: com.mmf.bsu.HappySpeechTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mmf.bsu.HappySpeechTests
        INFOPLIST_FILE: HappySpeechTests/Info.plist
        PRODUCT_NAME: HappySpeechTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HappySpeech.app/HappySpeech"
        OTHER_LDFLAGS: "-Wl,-w"
    dependencies:
      - target: HappySpeech
      - package: SnapshotTesting
        product: SnapshotTesting
      - package: RealmSwift
        product: RealmSwift
    scheme:
      gatherCoverageData: true

  HappySpeechWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget:
      iOS: "16.1"
    sources:
      - path: HappySpeechWidgetExtension
        excludes:
          - Info.plist
        type: group
      - path: HappySpeech/Features/Extensions/LiveActivities/LessonSessionAttributes.swift
        type: file
    entitlements:
      path: HappySpeechWidgetExtension/HappySpeechWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.mmf.bsu.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mmf.bsu.HappySpeech.WidgetExtension
        INFOPLIST_FILE: HappySpeechWidgetExtension/Info.plist
        PRODUCT_NAME: HappySpeechWidgetExtension
        CODE_SIGN_ENTITLEMENTS: HappySpeechWidgetExtension/HappySpeechWidgetExtension.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
        SWIFT_VERSION: "6.0"
        ENABLE_STRICT_CONCURRENCY: complete
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework
      - sdk: AppIntents.framework

  HappySpeechUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - HappySpeechUITests
    plist:
      path: HappySpeechUITests/Info.plist
      properties:
        CFBundleIdentifier: com.mmf.bsu.HappySpeechUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mmf.bsu.HappySpeechUITests
        INFOPLIST_FILE: HappySpeechUITests/Info.plist
        TEST_TARGET_NAME: HappySpeech
        PRODUCT_NAME: HappySpeechUITests
    dependencies:
      - target: HappySpeech
